# -- PaperMod Theme Parameters --
# https://github.com/adityatelange/hugo-PaperMod/wiki/Features

env = "production"
description = "Cybersecurity blog by Animesh Roy -- CTF walkthroughs, malware analysis, penetration testing, and security research."
author = "Animesh Roy"
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = true
hidemeta = false
hideSummary = false
showtoc = true
tocopen = false

[cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false

[editPost]
  URL = "https://github.com/anir0y/classroom/tree/master/content"
  Text = "Suggest Changes"
  appendFilePath = true

[profileMode]
  enabled = false
  title = "Classroom"
  subtitle = "Cybersecurity blog by Animesh Roy -- CTF walkthroughs, malware analysis, penetration testing, and security research."

[homeInfoParams]
  Title = "Classroom"
  Content = "CTF walkthroughs, malware analysis, penetration testing, and security research by Animesh Roy."

[[socialIcons]]
  name = "twitter"
  url = "https://twitter.com/anir0y"

[[socialIcons]]
  name = "github"
  url = "https://github.com/anir0y"

[[socialIcons]]
  name = "rss"
  url = "index.xml"

[fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]
